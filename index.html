<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 Certo</title>

<style>
@page {
    size: A4;
    margin: 0;
}

html,body{
    margin:0;
    padding:0;
    background:#dcdcdc;
    font-family:Arial, sans-serif;
}

/* área tela */
.wrapper{
    display:flex;
    justify-content:center;
    padding:20px 0;
}

/* A4 */
.a4{
    width:95%;
    max-width:800px;
    aspect-ratio:210/297;
    background:white;
    overflow:hidden;
}

/* área imagem */
.box{
    width:100%;
    height:100%;
    background:black;
    position:relative;
}

.box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.box label{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:18px;
    cursor:pointer;
}

input{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
}

button{
    display:block;
    margin:20px auto;
    padding:15px 40px;
    border:none;
    border-radius:16px;
    background:black;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* impressão */
@media print{

    body *{
        visibility:hidden;
    }

    .a4, .a4 *{
        visibility:visible;
    }

    .a4{
        position:absolute;
        left:0;
        top:0;
        width:210mm;
        height:297mm;
    }

    button{
        display:none;
    }

    body{
        background:white;
    }
}
</style>
</head>

<body>

<div class="wrapper">
<div class="a4">
    <div class="box">
        <label>
            Toque para adicionar imagem
            <input type="file" accept="image/*" onchange="loadImage(event)">
        </label>
        <img id="img">
    </div>
</div>
</div>

<button onclick="window.print()">Imprimir A4</button>

<script>
function loadImage(event){
    const file = event.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            const img = document.getElementById("img");
            img.src = e.target.result;
            img.style.display = "block";
            event.target.parentElement.style.display = "none";
        }
        reader.readAsDataURL(file);
    }
}
</script>

</body>
</html>
